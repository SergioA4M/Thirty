spring.application.name=thirty-api

# URL con sslmode para evitar que Supabase/Render corten la conexión
spring.datasource.url=jdbc:postgresql://db.ylxpcytucebvzijqyrsx.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=Bonfireeasyjet47!
spring.datasource.driver-class-name=org.postgresql.Driver

# Forzamos el dialecto para que no tenga que "preguntar" a la DB y no falle ahí
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Ajustes de conexión para no morir en el intento
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

server.port=${PORT:8080}