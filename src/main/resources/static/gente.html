<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Thirty - Gente</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👥</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; }
        body { background-color: #e9eff4; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        header { background: linear-gradient(to bottom, #4c66a4 0%, #3b5998 100%); border-bottom: 1px solid #2d4373; color: white; padding: 0 15%; height: 42px; display: flex; align-items: center; font-size: 12px; font-weight: bold; position: sticky; top: 0; z-index: 100; }
        .nav-item { padding: 0 12px; height: 100%; display: flex; align-items: center; cursor: pointer; border-right: 1px solid rgba(255,255,255,0.1); text-decoration: none; color: white; }
        .nav-item:hover { background-color: rgba(0,0,0,0.1); }
        .nav-active { background-color: #2d4373; }
        
        .main-container { max-width: 1200px; margin: 0 auto; padding: 20px 15%; }
        
        .page-title { font-size: 28px; color: #333; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .page-title i { color: #3b5998; }
        
        .search-section { background: white; padding: 20px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 20px; }
        .search-box { display: flex; gap: 10px; }
        .search-box input { flex: 1; padding: 12px 20px; border: 1px solid #ddd; border-radius: 25px; font-size: 14px; font-family: inherit; }
        .search-box input:focus { outline: none; border-color: #3b5998; }
        .search-btn { background: #3b5998; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .search-btn:hover { background: #2d4373; }
        
        .filters { display: flex; gap: 10px; margin-top: 15px; }
        .filter-btn { background: #f0f2f5; border: 1px solid #ddd; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 13px; color: #666; }
        .filter-btn.active { background: #3b5998; color: white; border-color: #3b5998; }
        
        .users-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .user-card { background: white; border-radius: 12px; border: 1px solid #ddd; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
        .user-card:hover { transform: translateY(-3px); box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        .user-card-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 80px; position: relative; }
        .user-card-avatar { width: 80px; height: 80px; border-radius: 50%; border: 4px solid white; position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%); object-fit: cover; background: white; }
        
        .user-card-body { padding: 50px 20px 20px; text-align: center; }
        .user-card-name { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 5px; }
        .user-card-bio { font-size: 13px; color: #666; margin-bottom: 15px; min-height: 40px; }
        .user-card-stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; padding: 10px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
        .stat { text-align: center; }
        .stat-number { font-size: 18px; font-weight: bold; color: #3b5998; }
        .stat-label { font-size: 11px; color: #999; }
        
        .user-card-actions { display: flex; gap: 10px; justify-content: center; }
        .btn { padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 13px; border: none; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-primary { background: #3b5998; color: white; }
        .btn-primary:hover { background: #2d4373; }
        .btn-secondary { background: #f0f2f5; color: #333; }
        .btn-secondary:hover { background: #e4e6eb; }
        .btn-success { background: #27ae60; color: white; }
        .btn-success:hover { background: #219a52; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .online-indicator { display: inline-block; width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; margin-left: 5px; }
        .online-indicator.offline { background: #95a5a6; }
        
        .empty-state { text-align: center; padding: 60px 20px; color: #666; }
        .empty-state i { font-size: 60px; color: #ddd; margin-bottom: 20px; }
        .empty-state h3 { margin: 0 0 10px 0; color: #999; }
        .empty-state p { margin: 0; font-size: 14px; }
        
        .no-results { text-align: center; padding: 40px; color: #999; }
        .no-results i { font-size: 50px; margin-bottom: 15px; color: #ddd; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 20px; margin-right: 20px;">thirty</div>
    <a href="home.html" class="nav-item">Inicio</a>
    <a href="perfil.html" class="nav-item">Perfil</a>
    <a href="mensajes.html" class="nav-item">Mensajes</a>
    <a href="gente.html" class="nav-item nav-active">Gente</a>
    <div style="margin-left: auto; display: flex; height: 100%;">
        <a href="#" class="nav-item">Mi cuenta</a>
        <a href="login.html" onclick="logout()" class="nav-item">Salir</a>
    </div>
</header>

<div class="main-container">
    <h1 class="page-title"><i class="fas fa-users"></i> Gente en Thirty</h1>
    
    <div class="search-section">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar personas por nombre o email..." onkeyup="if(event.key==='Enter')buscarUsuarios()">
            <button class="search-btn" onclick="buscarUsuarios()"><i class="fas fa-search"></i> Buscar</button>
        </div>
        <div class="filters">
            <button class="filter-btn active" onclick="filtrarUsuarios('todos')">Todos</button>
            <button class="filter-btn" onclick="filtrarUsuarios('online')">En línea</button>
            <button class="filter-btn" onclick="filtrarUsuarios('amigos')">Mis amigos</button>
            <button class="filter-btn" onclick="filtrarUsuarios('siguiendo')">Siguiendo</button>
        </div>
    </div>
    
    <div id="usersContainer" class="users-grid"></div>
</div>

<script>
const BASE_URL = 'https://thirty-poqp.onrender.com';
const miId = localStorage.getItem('usuarioID');

let todosLosUsuarios = [];
let misAmigos = [];
let filtroActual = 'todos';

window.onload = async () => {
    if (!miId) { window.location.href = "login.html"; return; }
    await cargarDatos();
};

async function cargarDatos() {
    try {
        const [usersResp, amigosResp] = await Promise.all([
            fetch(`${BASE_URL}/api/users`),
            fetch(`${BASE_URL}/api/users/${miId}/amigos`)
        ]);
        
        todosLosUsuarios = await usersResp.json();
        misAmigos = await amigosResp.json();
        
        renderizarUsuarios();
    } catch(e) { console.error(e); }
}

function esAmigo(userId) {
    return misAmigos.some(a => a.id === userId);
}

function renderizarUsuarios() {
    const container = document.getElementById('usersContainer');
    let usuarios = [...todosLosUsuarios].filter(u => u.id != miId);
    
    if (filtroActual === 'amigos') {
        usuarios = usuarios.filter(u => esAmigo(u.id));
    } else if (filtroActual === 'online') {
        usuarios = usuarios.filter(u => u.online);
    }
    
    if (usuarios.length === 0) {
        container.innerHTML = `
            <div class="no-results" style="grid-column: 1/-1;">
                <i class="fas fa-user-friends"></i>
                <p>No se encontraron personas</p>
            </div>`;
        return;
    }
    
    container.innerHTML = usuarios.map(u => {
        const foto = u.fotoPerfil ? `${BASE_URL}/uploads/${u.fotoPerfil}` : `https://ui-avatars.com/api/?name=${u.firstName}&background=3b5998&color=fff&size=128`;
        const esMiAmigo = esAmigo(u.id);
        const onlineClass = u.online ? '' : 'offline';
        
        let btnEstado = '';
        if (esMiAmigo) {
            btnEstado = `<button class="btn btn-danger" onclick="eliminarAmigo(${u.id}, this)"><i class="fas fa-user-minus"></i> Borrar amigo</button>`;
        } else {
            btnEstado = `<button class="btn btn-primary" onclick="agregarAmigo(${u.id}, this)"><i class="fas fa-user-plus"></i> Añadir</button>`;
        }
        
        return `
            <div class="user-card">
                <div class="user-card-header">
                    <img src="${foto}" class="user-card-avatar">
                </div>
                <div class="user-card-body">
                    <h3 class="user-card-name">
                        ${u.firstName} ${u.lastName || ''}
                        <span class="online-indicator ${onlineClass}"></span>
                    </h3>
                    <p class="user-card-bio">${u.bio || 'Sin estado'}</p>
                    <div class="user-card-stats">
                        <div class="stat">
                            <div class="stat-number">${misAmigos.length}</div>
                            <div class="stat-label">Amigos</div>
                        </div>
                    </div>
                    <div class="user-card-actions">
                        ${btnEstado}
                        <a href="perfil.html?id=${u.id}" class="btn btn-secondary"><i class="fas fa-eye"></i> Ver perfil</a>
                    </div>
                </div>
            </div>`;
    }).join('');
}

async function agregarAmigo(userId, boton) {
    boton.disabled = true;
    boton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Añadiendo...';
    
    try {
        const resp = await fetch(`${BASE_URL}/api/users/${miId}/agregar/${userId}`, {
            method: 'POST'
        });
        
        if (resp.ok) {
            misAmigos.push({ id: userId });
            renderizarUsuarios();
        } else {
            const error = await resp.text();
            boton.disabled = false;
            boton.innerHTML = '<i class="fas fa-user-plus"></i> Añadir';
            alert('Error: ' + error);
        }
    } catch(e) {
        boton.disabled = false;
        boton.innerHTML = '<i class="fas fa-user-plus"></i> Añadir';
        alert('Error de conexión');
    }
}

async function eliminarAmigo(userId, boton) {
    if (!confirm('¿Seguro que quieres eliminar a este amigo?')) return;
    
    boton.disabled = true;
    boton.innerHTML = '<i class="fas fa-spinner fa-spin"></i>...';
    
    try {
        const resp = await fetch(`${BASE_URL}/api/users/${miId}/amigos/${userId}`, {
            method: 'DELETE'
        });
        
        if (resp.ok) {
            misAmigos = misAmigos.filter(a => a.id !== userId);
            renderizarUsuarios();
        } else {
            boton.disabled = false;
            boton.innerHTML = '<i class="fas fa-user-minus"></i> Borrar amigo';
            alert('Error al eliminar amigo');
        }
    } catch(e) {
        boton.disabled = false;
        boton.innerHTML = '<i class="fas fa-user-minus"></i> Borrar amigo';
        alert('Error de conexión');
    }
}

function filtrarUsuarios(tipo) {
    filtroActual = tipo;
    
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    
    renderizarUsuarios();
}

async function buscarUsuarios() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    
    if (!query) {
        renderizarUsuarios();
        return;
    }
    
    const usuarios = [...todosLosUsuarios].filter(u => 
        u.id != miId && (
            (u.firstName + ' ' + (u.lastName || '')).toLowerCase().includes(query) ||
            u.email.toLowerCase().includes(query)
        )
    );
    
    const container = document.getElementById('usersContainer');
    
    if (usuarios.length === 0) {
        container.innerHTML = `
            <div class="no-results" style="grid-column: 1/-1;">
                <i class="fas fa-search"></i>
                <p>No se encontraron resultados para "${query}"</p>
            </div>`;
        return;
    }
    
    container.innerHTML = usuarios.map(u => {
        const foto = u.fotoPerfil ? `${BASE_URL}/uploads/${u.fotoPerfil}` : `https://ui-avatars.com/api/?name=${u.firstName}&background=3b5998&color=fff&size=128`;
        const esMiAmigo = esAmigo(u.id);
        const onlineClass = u.online ? '' : 'offline';
        
        let btnEstado = '';
        if (esMiAmigo) {
            btnEstado = `<button class="btn btn-success" disabled><i class="fas fa-check"></i> Amigos</button>`;
        } else {
            btnEstado = `<button class="btn btn-primary" onclick="agregarAmigo(${u.id}, this)"><i class="fas fa-user-plus"></i> Añadir</button>`;
        }
        
        return `
            <div class="user-card">
                <div class="user-card-header">
                    <img src="${foto}" class="user-card-avatar">
                </div>
                <div class="user-card-body">
                    <h3 class="user-card-name">
                        ${u.firstName} ${u.lastName || ''}
                        <span class="online-indicator ${onlineClass}"></span>
                    </h3>
                    <p class="user-card-bio">${u.bio || 'Sin estado'}</p>
                    <div class="user-card-actions">
                        ${btnEstado}
                        <a href="perfil.html?id=${u.id}" class="btn btn-secondary"><i class="fas fa-eye"></i> Ver perfil</a>
                    </div>
                </div>
            </div>`;
    }).join('');
}

function logout() {
    fetch(`${BASE_URL}/api/users/set-offline/${miId}`, { method: 'POST' });
    localStorage.clear();
}
</script>
</body>
</html>
