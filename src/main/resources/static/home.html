<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Thirty - Inicio</title>
    <script src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background-color: #e9eff4; font-family: 'Segoe UI', sans-serif; margin: 0; }
        header { background: linear-gradient(to bottom, #4c66a4 0%, #3b5998 100%); border-bottom: 1px solid #2d4373; color: white; padding: 0 15%; height: 42px; display: flex; align-items: center; font-size: 12px; font-weight: bold; }
        .main-grid { display: grid; grid-template-columns: 200px 1fr 250px; gap: 20px; padding: 20px 15%; }
        .card { background: white; padding: 15px; border: 1px solid #bdc3c7; margin-bottom: 15px; border-radius: 2px; }
        h5 { margin-top:0; border-bottom: 1px solid #eee; padding-bottom: 5px; color: #3b5998; }

        .social-links { list-style: none; padding: 0; }
        .social-links li { margin-bottom: 12px; display: flex; align-items: center; font-size: 14px; }
        .social-links a { text-decoration: none; color: #333; display: flex; align-items: center; width: 100%; transition: color 0.2s; }
        .social-links i { margin-right: 10px; width: 20px; text-align: center; font-size: 18px; color: #666; transition: transform 0.2s; }
        .social-links a:hover { color: #3b5998; }
        .social-links a:hover i { transform: scale(1.2); color: #3b5998; }

        .center-col .status-box { background: white; padding: 15px; border: 1px solid #bdc3c7; margin-bottom: 20px; position: relative; }
        .status-box textarea { width: 100%; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; resize: none; border-radius: 4px; }

        .post { background: white; padding: 15px; border: 1px solid #bdc3c7; margin-bottom: 15px; display: flex; gap: 10px; }
        .post img.avatar { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; }
        .post-content { flex: 1; overflow: hidden; }
        .post-header { font-weight: bold; color: #3b5998; margin-bottom: 5px; }
        .post-time { font-size: 11px; color: #999; margin-top: 8px; }

        .nav-item { padding: 0 12px; height: 100%; display: flex; align-items: center; cursor: pointer; border-right: 1px solid rgba(255,255,255,0.1); text-decoration: none; color: white; }
        .nav-item:hover { background-color: rgba(0,0,0,0.1); }
        .nav-active { background-color: #2d4373; }

        #emoji-picker-container { position: absolute; z-index: 999; top: 100%; left: 0; display: none; margin-top: 5px; }
        .btn-subir-header { background: #4c66a4; color: white; border: 1px solid #2d4373; padding: 5px 10px; cursor: pointer; font-weight: bold; border-radius: 3px; font-size: 11px; display: flex; align-items: center; gap: 5px; margin-left: 10px; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 20px; margin-right: 20px;">thirty</div>
    <a href="home.html" class="nav-item nav-active">Inicio</a>
    <a href="perfil.html" class="nav-item">Perfil</a>
    <a href="#" class="nav-item">Mensajes</a>
    <a href="#" class="nav-item">Gente</a>

    <input type="file" id="inputSubirTodo" style="display:none" onchange="subirYCompartirFoto()">
    <button onclick="document.getElementById('inputSubirTodo').click()" class="btn-subir-header">
        <i class="fas fa-camera"></i> Subir fotos
    </button>

    <div style="margin-left: auto; display: flex; height: 100%;">
        <a href="#" class="nav-item" style="border-left: 1px solid rgba(255,255,255,0.1);">Mi cuenta</a>
        <a href="login.html" onclick="localStorage.clear()" class="nav-item">Salir</a>
    </div>
</header>

<div class="main-grid">
    <div class="left-col">
        <div class="card">
            <input type="file" id="inputFoto" style="display: none;" accept="image/*" onchange="subirFotoManual()">
            <div class="profile-container" onclick="document.getElementById('inputFoto').click()" style="text-align:center; cursor:pointer;">
                <img id="userImg" src="https://ui-avatars.com/api/?name=U&background=3b5998&color=fff" style="width: 100px; height: 100px; object-fit: cover; border-radius: 2px;">
                <div style="font-size: 10px; color: #3b5998; margin-top: 2px;">Cambiar foto</div>
            </div>
            <h4 id="userName" style="margin:5px 0 0 0; text-align:center;">Usuario</h4>
        </div>

        <div class="card" id="seccion-notificaciones" style="padding: 10px; line-height: 1.8;">
            <h5 style="margin-bottom: 10px;">Notificaciones</h5>
            <div class="notif-item">
                <a href="#" style="text-decoration:none; color:#333; font-size:12px; font-weight:bold;">
                    <i class="fas fa-comment-alt" style="margin-right:5px; color:#3b5998;"></i>
                    <span id="count-mensajes">0</span> mensajes nuevos
                </a>
            </div>
            <div class="notif-item">
                <a href="#" style="text-decoration:none; color:#333; font-size:12px; font-weight:bold;">
                    <i class="fas fa-user-plus" style="margin-right:5px; color:#3b5998;"></i>
                    <span id="count-amigos">0</span> solicitudes
                </a>
            </div>
        </div>

        <div class="card">
            <h5>Mis Redes</h5>
            <ul class="social-links">
                <li><a href="https://github.com/" target="_blank"><i class="fab fa-github"></i> GitHub</a></li>
                <li><a href="https://linkedin.com/in/" target="_blank"><i class="fab fa-linkedin"></i> LinkedIn</a></li>
                <li><a href="https://instagram.com/" target="_blank"><i class="fab fa-instagram"></i> Instagram</a></li>
                <li><a href="https://x.com/" target="_blank"><i class="fa-brands fa-x-twitter"></i> X (Twitter)</a></li>
                <li><a href="https://tiktok.com/" target="_blank"><i class="fab fa-tiktok"></i> TikTok</a></li>
            </ul>
        </div>

        <div class="card">
            <h4 style="margin-top:0; font-size: 14px; color: #3b5998; border-bottom: 1px solid #eee; padding-bottom: 5px;">Contactos</h4>
            <div id="lista-contactos"></div>
        </div>
    </div>

    <div class="center-col">
        <div class="status-box">
            <textarea id="textoPost" placeholder="¿Qué hay de nuevo, treintañero?" rows="2"></textarea>
            <div id="emoji-picker-container"></div>
            <div style="margin-top:5px; display: flex; justify-content: space-between; align-items: center;">
                <button type="button" id="emoji-trigger" style="background:none; border:none; cursor:pointer; font-size:20px;">😊</button>
                <button onclick="publicarMensaje()" style="background:#3b5998; color:white; border:none; padding:6px 20px; cursor:pointer; font-weight:bold;">Publicar</button>
            </div>
        </div>
        <div id="muro"></div>
    </div>

    <div class="right-col">
        <div class="card" style="padding:0; height: 500px; display: flex; flex-direction: column;">
            <div id="chat-header" style="background: #f6f7f9; padding: 10px; border-bottom: 1px solid #bdc3c7; font-weight: bold; font-size: 13px; color: #3b5998;"> Chat </div>
            <div id="chat-window" style="flex:1; padding:10px; font-size:13px; overflow-y: auto; background: #f0f2f5;"></div>
            <div id="chat-input-area" style="padding: 10px; border-top: 1px solid #bdc3c7; display:none;">
                <div style="display:flex; gap:5px;">
                    <input type="text" id="mensajeTexto" style="flex:1; border:1px solid #ccc; border-radius:15px; padding:5px;">
                    <button onclick="enviarMensajeChat()" style="background:#3b5998; color:white; border:none; border-radius:50%; width:30px; height:30px;"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { Picker } from 'https://cdn.jsdelivr.net/npm/emoji-mart@5.5.2/+esm'
    const picker = new Picker({
        onEmojiSelect: (emoji) => {
            document.getElementById('textoPost').value += emoji.native;
            document.getElementById('emoji-picker-container').style.display = 'none';
        },
        locale: 'es', theme: 'light'
    });
    document.getElementById('emoji-picker-container').appendChild(picker);
    document.getElementById('emoji-trigger').onclick = () => {
        const c = document.getElementById('emoji-picker-container');
        c.style.display = c.style.display === 'none' ? 'block' : 'none';
    };
</script>

<script>
    const BASE_URL = 'https://thirty-poqp.onrender.com';
    let receptorIdActual = null;

    function parsearContenido(texto) {
        if (!texto) return "";
        let contenido = texto;
        const imgRegex = /\/uploads\/[^\s<>"]+/gi;
        contenido = contenido.replace(imgRegex, (match) => `<img src="${BASE_URL}${match}" style="max-width:100%; border-radius:8px; display:block; margin-top:10px;">`);
        return contenido;
    }

    document.addEventListener('DOMContentLoaded', () => {
        const nombre = localStorage.getItem('usuarioNombre');
        const foto = localStorage.getItem('usuarioFoto');
        const miId = localStorage.getItem('usuarioID') || localStorage.getItem('usuarioId');

        // NO HAY REDIRECCIÓN. Te deja entrar aunque no haya sesión para que no te bloquees.
        if (nombre) document.getElementById('userName').innerText = nombre;

        const imgEl = document.getElementById('userImg');
        if (foto && foto !== 'null' && foto !== '') {
            imgEl.src = `${BASE_URL}/uploads/${foto}`;
        } else if (nombre) {
            imgEl.src = `https://ui-avatars.com/api/?name=${nombre}&background=3b5998&color=fff`;
        }

        cargarPosts();
        if (miId && miId !== 'undefined') {
            cargarAmigosSidebar();
            // Solo llamamos a notificaciones si la ruta existe
            actualizarNotificaciones().catch(e => console.log("Notificaciones no listas"));
        }
    });

    async function cargarPosts() {
        try {
            const r = await fetch(`${BASE_URL}/api/posts`);
            const posts = await r.json();
            const muro = document.getElementById('muro');
            muro.innerHTML = "";
            posts.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).forEach(p => {
                const avatar = `https://ui-avatars.com/api/?name=${p.author}&background=3b5998&color=fff`;
                const borrar = (p.author === localStorage.getItem('usuarioNombre')) ? `<i class="fas fa-trash-alt" onclick="borrarPost(${p.id})" style="float:right; cursor:pointer; color:#ccc;"></i>` : "";
                muro.innerHTML += `<div class="post"><img src="${avatar}" class="avatar"><div class="post-content"><div class="post-header">${borrar}${p.author}</div><div>${parsearContenido(p.content)}</div><div class="post-time">${new Date(p.createdAt).toLocaleString()}</div></div></div>`;
            });
        } catch(e) {}
    }

    async function publicarMensaje() {
        const t = document.getElementById('textoPost');
        const nombre = localStorage.getItem('usuarioNombre') || 'Anónimo';
        if(!t.value.trim()) return;
        await fetch(`${BASE_URL}/api/posts`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({author: nombre, content: t.value})
        });
        t.value = "";
        cargarPosts();
    }

    async function cargarAmigosSidebar() {
        const id = localStorage.getItem('usuarioID') || localStorage.getItem('usuarioId');
        try {
            const r = await fetch(`${BASE_URL}/api/users/${id}/amigos`);
            const amigos = await r.json();
            const cont = document.getElementById('lista-contactos');
            cont.innerHTML = amigos.map(a => `<div onclick="abrirChat('${a.id}', '${a.firstName}')" style="cursor:pointer; margin-bottom:10px;"><i class="fas fa-circle" style="color:#2ecc71; font-size:8px;"></i> ${a.firstName}</div>`).join('');
        } catch(e){}
    }

    async function abrirChat(id, nombre) {
        receptorIdActual = id;
        document.getElementById('chat-header').innerText = "Chat con " + nombre;
        document.getElementById('chat-input-area').style.display = 'block';
        actualizarMensajes();
    }

    async function actualizarMensajes() {
        if(!receptorIdActual) return;
        const miId = localStorage.getItem('usuarioID') || localStorage.getItem('usuarioId');
        try {
            const r = await fetch(`${BASE_URL}/api/mensajes/historial/${miId}/${receptorIdActual}`);
            const msgs = await r.json();
            document.getElementById('chat-window').innerHTML = msgs.map(m => `<div style="text-align:${m.emisor.id == miId ? 'right' : 'left'};"><span style="background:${m.emisor.id == miId ? '#dcf8c6' : '#fff'}; padding:5px 10px; border-radius:10px; display:inline-block; margin:2px;">${m.contenido}</span></div>`).join('');
        } catch(e){}
    }

    async function enviarMensajeChat() {
        const i = document.getElementById('mensajeTexto');
        const miId = localStorage.getItem('usuarioID') || localStorage.getItem('usuarioId');
        if(!i.value.trim() || !receptorIdActual) return;
        await fetch(`${BASE_URL}/api/mensajes/enviar?emisorId=${miId}&receptorId=${receptorIdActual}`, {method: 'POST', body: i.value});
        i.value = "";
        actualizarMensajes();
    }

    async function subirFotoManual() {
        const f = document.getElementById('inputFoto');
        const id = localStorage.getItem('usuarioID') || localStorage.getItem('usuarioId');
        if(!f.files[0]) return;
        if (f.files[0].size > 1024 * 1024) { alert("Imagen demasiado grande (máx 1MB)"); return; }
        const fd = new FormData(); fd.append("file", f.files[0]);
        const r = await fetch(`${BASE_URL}/api/fotos/upload/${id}`, {method: 'POST', body: fd});
        if(r.ok) { const d = await r.json(); localStorage.setItem('usuarioFoto', d.url); location.reload(); }
    }

    async function subirYCompartirFoto() {
        const f = document.getElementById('inputSubirTodo');
        const id = localStorage.getItem('usuarioID') || localStorage.getItem('usuarioId');
        if(!f.files[0]) return;
        const fd = new FormData(); fd.append("file", f.files[0]);
        const r = await fetch(`${BASE_URL}/api/fotos/upload/${id}`, {method: 'POST', body: fd});
        if(r.ok) {
            const d = await r.json();
            await fetch(`${BASE_URL}/api/posts`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({author: localStorage.getItem('usuarioNombre'), content: `/uploads/${d.url}`})
            });
            location.reload();
        }
    }

    async function borrarPost(id) {
        if(confirm("¿Borrar?")) { await fetch(`${BASE_URL}/api/posts/${id}`, {method: 'DELETE'}); cargarPosts(); }
    }

    async function actualizarNotificaciones() {
        const id = localStorage.getItem('usuarioID') || localStorage.getItem('usuarioId');
        const r = await fetch(`${BASE_URL}/api/notificaciones/resumen/${id}`);
        if(r.ok) {
            const d = await r.json();
            document.getElementById('count-mensajes').innerText = d.mensajesNuevos || 0;
            document.getElementById('count-amigos').innerText = d.solicitudesAmistad || 0;
        }
    }

    setInterval(() => { if(receptorIdActual) actualizarMensajes(); }, 3000);
    window.borrarPost = borrarPost; window.abrirChat = abrirChat; window.enviarMensajeChat = enviarMensajeChat; window.subirFotoManual = subirFotoManual;
</script>
</body>
</html>
