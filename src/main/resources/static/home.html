<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Thirty - Inicio</title>
    <script src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background-color: #e9eff4; font-family: 'Segoe UI', sans-serif; margin: 0; }
        header { background: linear-gradient(to bottom, #4c66a4 0%, #3b5998 100%); border-bottom: 1px solid #2d4373; color: white; padding: 0 15%; height: 42px; display: flex; align-items: center; font-size: 12px; font-weight: bold; }
        .main-grid { display: grid; grid-template-columns: 200px 1fr 250px; gap: 20px; padding: 20px 15%; }
        .card { background: white; padding: 15px; border: 1px solid #bdc3c7; margin-bottom: 15px; border-radius: 2px; }
        h5 { margin-top:0; border-bottom: 1px solid #eee; padding-bottom: 5px; color: #3b5998; }

        .social-links { list-style: none; padding: 0; }
        .social-links li { margin-bottom: 12px; display: flex; align-items: center; font-size: 14px; }
        .social-links a { text-decoration: none; color: #333; display: flex; align-items: center; width: 100%; transition: color 0.2s; }
        .social-links i { margin-right: 10px; width: 20px; text-align: center; font-size: 18px; color: #666; transition: transform 0.2s; }
        .social-links a:hover { color: #3b5998; }
        .social-links a:hover i { transform: scale(1.2); color: #3b5998; }

        .center-col .status-box { background: white; padding: 15px; border: 1px solid #bdc3c7; margin-bottom: 20px; position: relative; }
        .status-box textarea { width: 100%; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; resize: none; border-radius: 4px; }

        .post { background: white; padding: 15px; border: 1px solid #bdc3c7; margin-bottom: 15px; display: flex; gap: 10px; }
        .post img.avatar { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; }
        .post-content { flex: 1; overflow: hidden; }
        .post-header { font-weight: bold; color: #3b5998; margin-bottom: 5px; }
        .post-time { font-size: 11px; color: #999; margin-top: 8px; }

        .nav-item { padding: 0 12px; height: 100%; display: flex; align-items: center; cursor: pointer; border-right: 1px solid rgba(255,255,255,0.1); text-decoration: none; color: white; }
        .nav-item:hover { background-color: rgba(0,0,0,0.1); }
        .nav-active { background-color: #2d4373; }

        #emoji-picker-container { position: absolute; z-index: 999; top: 100%; left: 0; display: none; margin-top: 5px; }

        .btn-subir-header { background: #4c66a4; color: white; border: 1px solid #2d4373; padding: 5px 10px; cursor: pointer; font-weight: bold; border-radius: 3px; font-size: 11px; display: flex; align-items: center; gap: 5px; margin-left: 10px; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 20px; margin-right: 20px;">thirty</div>
    <a href="home.html" class="nav-item nav-active">Inicio</a>
    <a href="perfil.html" class="nav-item">Perfil</a>
    <a href="#" class="nav-item">Mensajes</a>
    <a href="#" class="nav-item">Gente</a>

    <input type="file" id="inputSubirTodo" style="display:none" onchange="subirYCompartirFoto()">
    <button onclick="document.getElementById('inputSubirTodo').click()" class="btn-subir-header">
        <i class="fas fa-camera"></i> Subir fotos
    </button>

    <div style="margin-left: auto; display: flex; height: 100%;">
        <a href="#" class="nav-item" style="border-left: 1px solid rgba(255,255,255,0.1);">Mi cuenta</a>
        <a href="login.html" onclick="localStorage.clear()" class="nav-item">Salir</a>
    </div>
</header>

<div class="main-grid">
    <div class="left-col">
        <div class="card">
            <input type="file" id="inputFoto" style="display: none;" accept="image/*" onchange="subirFotoManual()">
            <div class="profile-container" onclick="document.getElementById('inputFoto').click()" style="text-align:center; cursor:pointer;">
                <img id="userImg" src="https://via.placeholder.com/100" style="width: 100px; height: 100px; object-fit: cover; border-radius: 2px;">
                <div style="font-size: 10px; color: #3b5998; margin-top: 2px;">Cambiar foto</div>
            </div>
            <h4 id="userName" style="margin:5px 0 0 0; text-align:center;">Cargando...</h4>
        </div>

        <div class="card" id="seccion-notificaciones" style="padding: 10px; line-height: 1.8;">
            <h5 style="margin-bottom: 10px;">Notificaciones</h5>
            <div class="notif-item">
                <a href="#" style="text-decoration:none; color:#333; font-size:12px; font-weight:bold;">
                    <i class="fas fa-comment-alt" style="margin-right:5px; color:#3b5998;"></i>
                    <span id="count-mensajes">0</span> mensajes nuevos
                </a>
            </div>
            <div class="notif-item">
                <a href="#" style="text-decoration:none; color:#333; font-size:12px; font-weight:bold;">
                    <i class="fas fa-user-plus" style="margin-right:5px; color:#3b5998;"></i>
                    <span id="count-amigos">0</span> solicitudes
                </a>
            </div>
        </div>

        <div class="card">
            <h5>Mis Redes</h5>
            <ul class="social-links">
                <li><a href="https://github.com/" target="_blank"><i class="fab fa-github"></i> GitHub</a></li>
                <li><a href="https://linkedin.com/in/" target="_blank"><i class="fab fa-linkedin"></i> LinkedIn</a></li>
                <li><a href="https://instagram.com/" target="_blank"><i class="fab fa-instagram"></i> Instagram</a></li>
                <li><a href="https://x.com/" target="_blank"><i class="fa-brands fa-x-twitter"></i> X (Twitter)</a></li>
                <li><a href="https://tiktok.com/" target="_blank"><i class="fab fa-tiktok"></i> TikTok</a></li>
            </ul>
        </div>

        <div class="card">
            <h4 style="margin-top:0; font-size: 14px; color: #3b5998; border-bottom: 1px solid #eee; padding-bottom: 5px;">Contactos</h4>
            <div id="lista-contactos"></div>
        </div>
    </div>

    <div class="center-col">
        <div class="status-box">
            <textarea id="textoPost" placeholder="¿Qué hay de nuevo, treintañero?" rows="2"></textarea>
            <div id="emoji-picker-container"></div>
            <div style="margin-top:5px; display: flex; justify-content: space-between; align-items: center;">
                <button type="button" id="emoji-trigger" style="background:none; border:none; cursor:pointer; font-size:20px;">😊</button>
                <button onclick="publicarMensaje()" style="background:#3b5998; color:white; border:none; padding:6px 20px; cursor:pointer; font-weight:bold;">Publicar</button>
            </div>
        </div>
        <span class="feed-title" style="font-weight:bold; color:#666; font-size:13px; display:block; margin-bottom:10px;">Novedades de tus amistades</span>
        <div id="muro"></div>
    </div>

    <div class="right-col">
        <div class="card" style="padding:0; height: 500px; display: flex; flex-direction: column;">
            <div id="chat-header" style="background: #f6f7f9; padding: 10px; border-bottom: 1px solid #bdc3c7; font-weight: bold; font-size: 13px; color: #3b5998;">
                Selecciona un contacto
            </div>
            <div id="chat-window" style="flex:1; padding:10px; font-size:13px; overflow-y: auto; background: #f0f2f5;">
                <p style="color:gray; text-align:center; margin-top:50px;">Haz clic en un amigo para hablar</p>
            </div>
            <div id="chat-input-area" style="padding: 10px; border-top: 1px solid #bdc3c7; display:none;">
                <div style="display:flex; gap:5px;">
                    <input type="text" id="mensajeTexto" placeholder="Escribe un mensaje..." style="flex:1; border:1px solid #ccc; border-radius:15px; padding:5px 12px; outline:none;">
                    <button onclick="enviarMensajeChat()" style="background:#3b5998; color:white; border:none; border-radius:50%; width:30px; height:30px; cursor:pointer;">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { Picker } from 'https://cdn.jsdelivr.net/npm/emoji-mart@5.5.2/+esm'
    const pickerOptions = {
        onEmojiSelect: (emoji) => {
            const textarea = document.getElementById('textoPost');
            textarea.value += emoji.native;
            document.getElementById('emoji-picker-container').style.display = 'none';
        },
        locale: 'es', theme: 'light'
    }
    const picker = new Picker(pickerOptions);
    document.getElementById('emoji-picker-container').appendChild(picker);
    window.toggleEmojiPicker = () => {
        const container = document.getElementById('emoji-picker-container');
        container.style.display = (container.style.display === 'none' || container.style.display === '') ? 'block' : 'none';
    }
    document.getElementById('emoji-trigger').addEventListener('click', window.toggleEmojiPicker);
</script>

<script>
    const BASE_URL = 'https://thirty-poqp.onrender.com';

    function parsearContenido(texto) {
        if (!texto) return "";
        let contenido = texto;
        const imgLocalRegex = /\/uploads\/[^\s<>"]+/gi;
        contenido = contenido.replace(imgLocalRegex, (match) => {
            return `<img src="${BASE_URL}${match}" style="max-width:100%; border-radius:8px; margin-top:10px; display:block; border:1px solid #ddd;">`;
        });
        const ytRegex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]{11})/gi;
        contenido = contenido.replace(ytRegex, '<div style="margin:10px 0; position:relative; padding-bottom:56.25%; height:0; overflow:hidden;"><iframe style="position:absolute; top:0; left:0; width:100%; height:100%; border-radius:8px;" src="https://www.youtube.com/embed/$1" frameborder="0" allowfullscreen></iframe></div>');
        return contenido;
    }

    document.addEventListener('DOMContentLoaded', () => {
        const miId = localStorage.getItem('usuarioID') || localStorage.getItem('usuarioId');
        if (!miId) { window.location.href = "login.html"; return; }

        const nombre = localStorage.getItem('usuarioNombre');
        const foto = localStorage.getItem('usuarioFoto');

        document.getElementById('userName').innerText = nombre || "Usuario";

        // Lógica de foto mejorada
        if (foto && foto !== 'null' && foto !== 'undefined') {
            document.getElementById('userImg').src = `${BASE_URL}/uploads/${foto}`;
        } else {
            document.getElementById('userImg').src = `https://ui-avatars.com/api/?name=${nombre || 'U'}&background=3b5998&color=fff`;
        }

        cargarPosts();
        cargarAmigosSidebar();
        actualizarNotificaciones();
    });

    async function cargarPosts() {
        try {
            const response = await fetch(`${BASE_URL}/api/posts`);
            const posts = await response.json();
            const muro = document.getElementById('muro');
            muro.innerHTML = "";
            posts.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            posts.forEach(post => {
                const fecha = new Date(post.createdAt).toLocaleString();
                const contenidoParsed = parsearContenido(post.content);
                const avatarUrl = `https://ui-avatars.com/api/?name=${post.author}&background=3b5998&color=fff`;
                const botonBorrar = (post.author === localStorage.getItem('usuarioNombre'))
                    ? `<i class="fas fa-trash-alt" onclick="borrarPost(${post.id})" style="cursor:pointer; color:#ccc; font-size:12px; float:right;"></i>`
                    : "";
                muro.innerHTML += `<div class="post" id="post-${post.id}"><img src="${avatarUrl}" class="avatar"><div class="post-content"><div class="post-header">${botonBorrar}<span>${post.author}</span></div><div style="font-size:14px; margin-top:5px;">${contenidoParsed}</div><div class="post-time">${fecha}</div></div></div>`;
            });
        } catch (e) { console.error("Error posts"); }
    }

    async function cargarAmigosSidebar() {
        const miId = localStorage.getItem('usuarioID') || localStorage.getItem('usuarioId');
        try {
            const response = await fetch(`${BASE_URL}/api/users/${miId}/amigos`);
            const amigos = await response.json();
            const contenedor = document.getElementById('lista-contactos');
            contenedor.innerHTML = amigos.length ? "" : "<p style='color:gray; font-size:12px;'>Sin amigos.</p>";
            amigos.forEach(amigo => {
                contenedor.innerHTML += `<div onclick="abrirChat('${amigo.id}', '${amigo.firstName}')" style="display:flex; align-items:center; gap:10px; margin-bottom:12px; cursor:pointer;"><div style="width:8px; height:8px; background:#2ecc71; border-radius:50%;"></div><span style="font-size:14px;">${amigo.firstName} ${amigo.lastName}</span></div>`;
            });
        } catch (e) { }
    }

    async function abrirChat(id, nombre) {
        receptorIdActual = id;
        document.getElementById('chat-header').innerText = "Chat con " + nombre;
        document.getElementById('chat-input-area').style.display = 'block';
        actualizarMensajes();
    }

    async function actualizarMensajes() {
        if (!receptorIdActual) return;
        const miId = localStorage.getItem('usuarioID') || localStorage.getItem('usuarioId');
        try {
            const response = await fetch(`${BASE_URL}/api/mensajes/historial/${miId}/${receptorIdActual}`);
            const mensajes = await response.json();
            const win = document.getElementById('chat-window');
            win.innerHTML = mensajes.map(m => {
                const soyYo = m.emisor.id == miId;
                return `<div style="text-align:${soyYo?'right':'left'}; margin-bottom:10px;"><span style="background:${soyYo?'#dcf8c6':'white'}; padding:6px 10px; border-radius:8px; display:inline-block; max-width:80%;">${m.contenido}</span></div>`;
            }).join('');
            win.scrollTop = win.scrollHeight;
        } catch(e){}
    }

    async function enviarMensajeChat() {
        const input = document.getElementById('mensajeTexto');
        const miId = localStorage.getItem('usuarioID') || localStorage.getItem('usuarioId');
        if (!input.value.trim() || !receptorIdActual) return;
        const res = await fetch(`${BASE_URL}/api/mensajes/enviar?emisorId=${miId}&receptorId=${receptorIdActual}`, { method: 'POST', body: input.value });
        if (res.ok) { input.value = ""; actualizarMensajes(); }
    }

    async function publicarMensaje() {
        const el = document.getElementById('textoPost');
        if (!el.value.trim()) return;
        await fetch(`${BASE_URL}/api/posts`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ author: localStorage.getItem('usuarioNombre'), content: el.value })
        });
        el.value = "";
        cargarPosts();
    }

    // FUNCIÓN SUBIR FOTO DESDE EL AVATAR
    async function subirFotoManual() {
        const fileInput = document.getElementById('inputFoto');
        const miId = localStorage.getItem('usuarioID') || localStorage.getItem('usuarioId');
        if (!fileInput.files[0]) return;
        const formData = new FormData();
        formData.append("file", fileInput.files[0]);
        try {
            const resp = await fetch(`${BASE_URL}/api/fotos/upload/${miId}`, { method: 'POST', body: formData });
            if (resp.ok) {
                const data = await resp.json();
                localStorage.setItem('usuarioFoto', data.url);
                location.reload();
            }
        } catch(e) { alert("Error al subir foto"); }
    }

    // FUNCIÓN SUBIR FOTO DESDE HEADER Y PUBLICAR
    async function subirYCompartirFoto() {
        const fileInput = document.getElementById('inputSubirTodo');
        const miId = localStorage.getItem('usuarioID') || localStorage.getItem('usuarioId');
        if (!fileInput.files[0]) return;
        const formData = new FormData();
        formData.append("file", fileInput.files[0]);
        try {
            const respFoto = await fetch(`${BASE_URL}/api/fotos/upload/${miId}`, { method: 'POST', body: formData });
            if (respFoto.ok) {
                const data = await respFoto.json();
                await fetch(`${BASE_URL}/api/posts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ author: localStorage.getItem('usuarioNombre'), content: `He subido una nueva foto: /uploads/${data.url}` })
                });
                location.reload();
            }
        } catch (e) { alert("Error al subir"); }
    }

    async function borrarPost(id) {
        if (confirm("¿Borrar?")) { await fetch(`${BASE_URL}/api/posts/${id}`, { method: 'DELETE' }); cargarPosts(); }
    }

    async function actualizarNotificaciones() {
        const miId = localStorage.getItem('usuarioID') || localStorage.getItem('usuarioId');
        try {
            const resp = await fetch(`${BASE_URL}/api/notificaciones/resumen/${miId}`);
            if (resp.ok) {
                const data = await resp.json();
                document.getElementById('count-mensajes').innerText = data.mensajesNuevos || 0;
                document.getElementById('count-amigos').innerText = data.solicitudesAmistad || 0;
            }
        } catch (e) { }
    }

    let receptorIdActual = null;
    setInterval(() => { if (receptorIdActual) actualizarMensajes(); }, 3000);
    window.borrarPost = borrarPost;
    window.abrirChat = abrirChat;
    window.enviarMensajeChat = enviarMensajeChat;
    window.subirFotoManual = subirFotoManual;
</script>
</body>
</html>
