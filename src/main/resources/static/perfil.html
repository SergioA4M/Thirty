<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Thirty - Perfil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background-color: #e9eff4; font-family: 'Segoe UI', sans-serif; margin: 0; }
        header { background: #3b5998; color: white; padding: 0 15%; height: 42px; display: flex; align-items: center; font-weight: bold; }
        .main-grid { display: grid; grid-template-columns: 250px 1fr 250px; gap: 20px; padding: 20px 15%; }
        .card { background: white; padding: 15px; border: 1px solid #bdc3c7; margin-bottom: 15px; border-radius: 2px; }
        .user-name { font-size: 24px; color: #333; margin: 0; }
        .nav-item { padding: 0 12px; color: white; text-decoration: none; font-size: 12px; }
        .avatar-grande { width: 100%; border: 1px solid #ccc; padding: 4px; background: white; height: 200px; object-fit: cover; border-radius: 4px; }

        /* Amigos */
        .amigo-item { text-decoration: none; color: #3b5998; text-align: center; font-size: 10px; }
        .amigo-item img { width: 60px; height: 60px; object-fit: cover; border: 1px solid #ddd; padding: 2px; background: white; display: block; margin: 0 auto 5px; }
        .amigo-item:hover img { border-color: #3b5998; }

        /* Bio Edición */
        #displayBio:hover #iconEditBio { opacity: 1; }
        #iconEditBio { opacity: 0; transition: 0.2s; color: #3b5998; cursor: pointer; margin-left: 8px; font-size: 12px; }

        /* Sobre Mí */
        .info-card { background: white; padding: 20px; border-radius: 12px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .info-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 10px; border-bottom: 2px solid #f0f2f5; }
        .info-header h5 { margin: 0; font-size: 16px; color: #1a1a1a; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .timeline-item { position: relative; padding-left: 45px; margin-bottom: 25px; }
        .timeline-item::before { content: ''; position: absolute; left: 17px; top: 35px; bottom: -20px; width: 2px; background: #eef2ff; }
        .timeline-item:last-child::before { display: none; }
        .timeline-icon-container { position: absolute; left: 0; top: 0; width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; z-index: 2; border: 2px solid white; }
        .icon-edu { background: #eef2ff; color: #3b5998; }
        .icon-work { background: #fff7ed; color: #ea580c; }
        .icon-life { background: #f0fdf4; color: #16a34a; }
        .info-label-tag { display: block; font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
        .info-valor-modern { display: block; font-size: 13px; color: #333; line-height: 1.4; font-weight: 500; }
        #btnEditarInfo { transition: 0.2s; color: #999; cursor: pointer; padding: 5px; }
        #btnEditarInfo:hover { color: #3b5998; transform: rotate(15deg); }

        /* Modal */
        .modal-input { width: 92%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; }
        .btn-save { background: #3b5998; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* Botón Subir Fotos */
        .btn-subir-header { background: #4c66a4; color: white; border: 1px solid #2d4373; padding: 5px 10px; cursor: pointer; font-weight: bold; border-radius: 3px; transition: background 0.2s; box-shadow: inset 0 1px 0 rgba(255,255,255,0.2); }
        .btn-subir-header:hover { background: #5b74a8; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 20px; margin-right: 20px;">thirty</div>
    <a href="home.html" class="nav-item">Inicio</a>
    <a href="perfil.html" class="nav-item nav-active">Perfil</a>
    <a href="#" class="nav-item">Mensajes</a>
    <a href="#" class="nav-item">Gente</a>
    <div class="header-right" style="margin-left: auto; display: flex; gap: 15px; align-items: center;">
        <input type="file" id="inputSubirTodo" style="display:none" onchange="subirYCompartirFoto()">
        <button onclick="document.getElementById('inputSubirTodo').click()" class="btn-subir-header">
            <i class="fas fa-camera"></i> Subir fotos
        </button>
        <a href="login.html" onclick="localStorage.clear()" style="color:white; text-decoration:none; font-size:12px;">Salir</a>
    </div>
</header>

<div class="main-grid">
    <div class="left-col">
        <div class="card" style="padding:5px;">
            <img id="perfilImg" src="https://via.placeholder.com/200" class="avatar-grande">
        </div>

        <div class="card info-card">
            <div class="info-header">
                <h5>Sobre mí</h5>
                <i class="fas fa-pen-to-square" id="btnEditarInfo" onclick="abrirModalPerfil()"></i>
            </div>
            <div class="timeline-item">
                <div class="timeline-icon-container icon-edu"><i class="fas fa-graduation-cap"></i></div>
                <div class="info-content"><span class="info-label-tag">Educación</span><span id="perfilEstudios" class="info-valor-modern">---</span></div>
            </div>
            <div class="timeline-item">
                <div class="timeline-icon-container icon-work"><i class="fas fa-briefcase"></i></div>
                <div class="info-content"><span class="info-label-tag">Trayectoria</span><span id="perfilTrayectoria" class="info-valor-modern">---</span></div>
            </div>
            <div class="timeline-item">
                <div class="timeline-icon-container icon-life"><i class="fas fa-map-location-dot"></i></div>
                <div class="info-content"><span class="info-label-tag">Life Style</span><span id="perfilZonas" class="info-valor-modern">---</span></div>
            </div>
        </div>
    </div>

    <div class="center-col">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h1 id="perfilNombreCompleto" class="user-name">Cargando...</h1>
        </div>

        <div class="card" style="background: #f6f7f9; border-radius: 8px;">
            <div id="displayBio" onclick="habilitarEdicionBio()" style="cursor: pointer;">
                <span id="perfilBio" style="font-size: 14px; color: #444; font-style: italic;">"Cargando estado..."</span>
                <i class="fas fa-pencil-alt" id="iconEditBio"></i>
            </div>
            <div id="editBioContainer" style="display: none; gap: 5px;">
                <input type="text" id="inputBio" style="flex: 1; padding: 8px; border: 1px solid #3b5998; border-radius: 4px;">
                <button onclick="actualizarEstadoRapido()" style="background: #3b5998; color: white; border: none; padding: 5px 12px; cursor: pointer; border-radius: 4px;">OK</button>
                <button onclick="cancelarEdicionBio()" style="background: #ccc; border: none; padding: 5px 12px; cursor: pointer; border-radius: 4px;">X</button>
            </div>
        </div>

        <div class="card" style="border-left: 5px solid #3b5998; border-radius: 4px;">
            <h5 style="margin-top:0; display: flex; justify-content: space-between; color: #3b5998;">
                Espacio Personal
                <i class="fas fa-cog" id="btnEditarEspacio" onclick="cambiarEspacio()" style="cursor:pointer; color:#999; font-size: 12px;"></i>
            </h5>
            <div id="contenedorEspacio" style="text-align: center; background: #000; border-radius: 2px; overflow: hidden;">
                <div style="padding: 40px; color: white; font-size: 12px;">Vacío</div>
            </div>
        </div>

        <h4 style="border-bottom: 1px solid #ccc; padding-bottom: 5px; color: #666; font-size: 14px; letter-spacing: 1px;">TABLÓN</h4>
        <div id="tablon">
            <div class="card">
                <textarea id="nuevoComentario" placeholder="Escribe algo en el tablón..." style="width:100%; border:1px solid #ddd; height: 50px; padding: 5px; font-family: inherit; resize: none; box-sizing: border-box;"></textarea>
                <div style="text-align: right; margin-top: 5px;">
                    <button onclick="publicarComentario()" style="background: #3b5998; color: white; border: none; padding: 6px 20px; cursor: pointer; font-weight: bold; border-radius: 2px;">Firmar</button>
                </div>
            </div>
            <div id="listaComentarios"></div>
        </div>
    </div>

    <div class="right-col">
        <div class="card">
            <h5 style="margin-top:0; display: flex; justify-content: space-between;">
                Álbum <i class="fas fa-plus" id="btnSubirFoto" onclick="document.getElementById('albumInput').click()" style="cursor:pointer; color:#3b5998;"></i>
            </h5>
            <input type="file" id="albumInput" style="display:none" onchange="subirAlAlbum()">
            <div id="cuadriculaFotos" style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;"></div>
        </div>

        <div class="card">
            <h5 style="margin-top:0; border-bottom: 1px solid #eee; padding-bottom: 5px;">Amigos</h5>
            <div id="listaAmigosPerfil" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px;"></div>
        </div>
    </div>
</div>

<div id="modalPerfil" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index:100; border-radius: 12px; width: 320px;">
    <h3 style="margin-top:0; color:#333;">Información Profesional</h3>
    <label class="info-label-tag">Educación</label>
    <input type="text" id="editEstudios" class="modal-input">
    <label class="info-label-tag">Experiencia</label>
    <input type="text" id="editTrayectoria" class="modal-input">
    <label class="info-label-tag">Ocio / Zonas</label>
    <input type="text" id="editZonas" class="modal-input">
    <div style="text-align: right; margin-top: 10px;">
        <button onclick="cerrarModalPerfil()" style="background:none; border:none; color:#888; cursor:pointer; margin-right: 15px;">Cancelar</button>
        <button onclick="guardarPerfil()" class="btn-save">Guardar cambios</button>
    </div>
</div>

<script>
    // --- CORRECCIÓN DE CONEXIÓN RENDER ---
    const BASE_URL = 'https://thirty-poqp.onrender.com';
    const params = new URLSearchParams(window.location.search);

    // Corregimos usuarioID para que no sea null
    const miId = localStorage.getItem('usuarioID');
    const miNombre = localStorage.getItem('usuarioNombre');
    let perfilId = params.get('id') || miId;

    // --- PARSEADOR MANTENIDO ---
    function parsearContenido(texto) {
        if (!texto) return "";
        let contenido = texto;
        const imgLocalRegex = /\/uploads\/[^\s<>"]+/gi;
        contenido = contenido.replace(imgLocalRegex, (match) => {
            return `<img src="${BASE_URL}${match}" style="max-width:100%; border-radius:8px; margin-top:10px; display:block; border:1px solid #ddd;">`;
        });
        const ytRegex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]{11})/gi;
        contenido = contenido.replace(ytRegex, '<div style="margin:10px 0; position:relative; padding-bottom:56.25%; height:0; overflow:hidden;"><iframe style="position:absolute; top:0; left:0; width:100%; height:100%; border-radius:8px;" src="https://www.youtube.com/embed/$1" frameborder="0" allowfullscreen></iframe></div>');
        return contenido;
    }

    window.onload = async () => {
        if (!miId) { window.location.href = "login.html"; return; }
        await cargarDatosPerfil();
        cargarAlbum();
        cargarComentarios();
        cargarAmigos();
    };

    async function cargarDatosPerfil() {
        const resp = await fetch(`${BASE_URL}/api/users/${perfilId}`);
        if (resp.ok) {
            const user = await resp.json();
            document.getElementById('perfilNombreCompleto').innerText = user.firstName + " " + user.lastName;
            document.getElementById('perfilBio').innerText = user.bio ? `"${user.bio}"` : "Sin estado";
            document.getElementById('perfilEstudios').innerText = user.estudios || "---";
            document.getElementById('perfilTrayectoria').innerText = user.trayectoria || "---";
            document.getElementById('perfilZonas').innerText = user.zonasMarcha || "---";
            if (user.fotoPerfil) document.getElementById('perfilImg').src = BASE_URL + "/uploads/" + user.fotoPerfil;

            if (perfilId !== miId) {
                const elementosOcultar = ['btnEditarInfo', 'btnSubirFoto', 'btnEditarEspacio', 'iconEditBio', 'btnSubirHeader'];
                elementosOcultar.forEach(id => { if(document.getElementById(id)) document.getElementById(id).style.display = 'none'; });
            }
        }
    }

    async function cargarComentarios() {
        try {
            const respCom = await fetch(`${BASE_URL}/api/comentarios/perfil/${perfilId}`);
            const comentarios = await respCom.json();
            const respPosts = await fetch(`${BASE_URL}/api/posts`);
            const todosLosPosts = await respPosts.json();

            const nombreDuenio = document.getElementById('perfilNombreCompleto').innerText.split(' ')[0];
            const misPosts = todosLosPosts.filter(p => p.author === nombreDuenio);

            let listaMix = [
                ...comentarios.map(c => ({...c, tipo: 'comentario'})),
                ...misPosts.map(p => ({...p, tipo: 'post'}))
            ];
            listaMix.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));

            const div = document.getElementById('listaComentarios');
            div.innerHTML = "";
            listaMix.forEach(item => {
                const esPost = item.tipo === 'post';
                const autor = esPost ? item.author : item.autor.firstName;
                const textoFinal = esPost ? parsearContenido(item.content) : item.contenido;
                const avatar = esPost ? `https://ui-avatars.com/api/?name=${autor}&background=3b5998&color=fff` : (item.autor.fotoPerfil ? `${BASE_URL}/uploads/${item.autor.fotoPerfil}` : 'https://via.placeholder.com/40');

                div.innerHTML += `
                    <div class="card" style="display: flex; gap: 10px; padding: 10px; border-radius: 4px; ${esPost ? 'border-left: 4px solid #3b5998;' : ''}">
                        <img src="${avatar}" style="width: 40px; height: 40px; object-fit: cover; border-radius: 2px;">
                        <div style="flex: 1;">
                            <div style="font-weight: bold; color: #3b5998; font-size: 12px;">${autor}</div>
                            <div style="font-size: 13px; margin-top:3px;">${textoFinal}</div>
                        </div>
                    </div>`;
            });
        } catch (e) { console.error(e); }
    }

    async function subirYCompartirFoto() {
        const fileInput = document.getElementById('inputSubirTodo');
        if (!fileInput.files[0]) return;
        const formData = new FormData();
        formData.append("file", fileInput.files[0]);
        try {
            const respFoto = await fetch(`${BASE_URL}/api/fotos/upload/${miId}`, { method: 'POST', body: formData });
            if (respFoto.ok) {
                const data = await respFoto.json();
                await fetch(`${BASE_URL}/api/posts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ author: miNombre, content: `Nueva foto: /uploads/${data.url}` })
                });
                location.reload();
            }
        } catch (e) { alert("Error"); }
    }

    async function cargarAlbum() {
        try {
            const resp = await fetch(`${BASE_URL}/api/fotos/usuario/${perfilId}`);
            if (resp.ok) {
                const fotos = await resp.json();
                const div = document.getElementById('cuadriculaFotos');
                div.innerHTML = fotos.reverse().slice(0, 6).map(f => `
                    <div style="aspect-ratio: 1/1; overflow: hidden; border: 1px solid #ddd;">
                        <img src="${BASE_URL}/uploads/${f.url}" style="width:100%; height:100%; object-fit:cover;">
                    </div>`).join('');
            }
        } catch (e) { }
    }

    async function cargarAmigos() {
        const resp = await fetch(`${BASE_URL}/api/users`);
        if (resp.ok) {
            const usuarios = await resp.json();
            const div = document.getElementById('listaAmigosPerfil');
            div.innerHTML = usuarios.filter(u => u.id != perfilId).slice(0, 9).map(u => {
                const foto = u.fotoPerfil ? `${BASE_URL}/uploads/${u.fotoPerfil}` : 'https://via.placeholder.com/60';
                return `<a href="perfil.html?id=${u.id}" class="amigo-item"><img src="${foto}"><div>${u.firstName}</div></a>`;
            }).join('');
        }
    }

    async function publicarComentario() {
        const texto = document.getElementById('nuevoComentario').value;
        if (!texto.trim()) return;
        await fetch(`${BASE_URL}/api/comentarios/${perfilId}/${miId}`, {
            method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: texto
        });
        document.getElementById('nuevoComentario').value = "";
        cargarComentarios();
    }

    function habilitarEdicionBio() {
        document.getElementById('displayBio').style.display = 'none';
        document.getElementById('editBioContainer').style.display = 'flex';
        document.getElementById('inputBio').value = document.getElementById('perfilBio').innerText.replace(/"/g, "");
    }
    function cancelarEdicionBio() {
        document.getElementById('displayBio').style.display = 'block';
        document.getElementById('editBioContainer').style.display = 'none';
    }
    async function actualizarEstadoRapido() {
        const nuevoTexto = document.getElementById('inputBio').value;
        await fetch(`${BASE_URL}/api/users/${miId}/perfil`, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ bio: nuevoTexto })
        });
        location.reload();
    }
    function abrirModalPerfil() { document.getElementById('modalPerfil').style.display = 'block'; }
    function cerrarModalPerfil() { document.getElementById('modalPerfil').style.display = 'none'; }
    async function guardarPerfil() {
        const datos = {
            estudios: document.getElementById('editEstudios').value,
            trayectoria: document.getElementById('editTrayectoria').value,
            zonasMarcha: document.getElementById('editZonas').value
        };
        await fetch(`${BASE_URL}/api/users/${miId}/perfil`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(datos) });
        location.reload();
    }
</script>
</body>
</html>
